<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e91e8c"/>
      <stop offset="100%" stop-color="#9c27b0"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="512" height="256" rx="115" ry="115" fill="url(#shine)"/>
  <!-- Decorative circles -->
  <circle cx="430" cy="95"  r="72"  fill="rgba(255,255,255,0.10)"/>
  <circle cx="90"  cy="420" r="55"  fill="rgba(255,255,255,0.08)"/>
  <circle cx="400" cy="400" r="35"  fill="rgba(255,255,255,0.06)"/>
  <!-- Petal accent top-right -->
  <ellipse cx="378" cy="132" rx="22" ry="36" fill="rgba(255,255,255,0.55)" transform="rotate(-30 378 132)"/>
  <ellipse cx="412" cy="108" rx="18" ry="30" fill="rgba(255,255,255,0.45)" transform="rotate(20 412 108)"/>
  <ellipse cx="395" cy="95"  rx="15" ry="26" fill="rgba(255,255,255,0.40)" transform="rotate(-70 395 95)"/>
  <circle  cx="393" cy="120" r="10"  fill="rgba(255,255,255,0.70)"/>
  <!-- X letter -->
  <text x="256" y="346"
        font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
        font-size="290" font-weight="900"
        fill="white"
        text-anchor="middle"
        letter-spacing="-8"
        opacity="0.97">X</text>
  <!-- Bottom tagline bar -->
  <rect x="152" y="378" width="208" height="6" rx="3" fill="rgba(255,255,255,0.35)"/>
</svg>
